<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BF168</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Mali:wght@400;600;700&display=swap');

  :root{
    --bg: #0A0612;
    --screen: #150C24;
    --neon: #FF3EA5;
    --cyan: #4CF3E0;
    --ink: #F4EEFF;
    --dim: #8A7BA8;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html, body{
    min-height:100%;
    background: var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
    font-family:'Mali', sans-serif;
    color: var(--ink);
  }

  .screen{
    position:relative;
    width:min(420px, 92vw);
    background: var(--screen);
    border: 3px solid var(--cyan);
    border-radius: 14px;
    padding: 46px 30px 38px;
    text-align:center;
    box-shadow:
      0 0 0 6px rgba(76,243,224,0.08),
      0 0 40px rgba(76,243,224,0.15),
      0 25px 60px -20px rgba(0,0,0,0.7);
    overflow:hidden;
    opacity:0;
    animation: flicker-in 0.7s steps(6) forwards;
  }

  @keyframes flicker-in{
    0%{ opacity:0; }
    30%{ opacity:0.4; }
    45%{ opacity:0.1; }
    60%{ opacity:0.8; }
    100%{ opacity:1; }
  }

  .screen::before{
    content:"";
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.035) 0px,
      rgba(255,255,255,0.035) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events:none;
  }

  .label{
    font-family:'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--dim);
    margin-bottom: 22px;
  }

  .callsign{
    font-family:'Press Start 2P', monospace;
    font-size: clamp(30px, 9vw, 42px);
    color: var(--neon);
    text-shadow:
      0 0 8px rgba(255,62,165,0.75),
      0 0 22px rgba(255,62,165,0.4);
    letter-spacing: 0.04em;
  }

  .cursor{
    display:inline-block;
    width: 0.5em;
    background: var(--neon);
    margin-left: 4px;
    animation: blink 1s steps(1) infinite;
    vertical-align: -0.12em;
    height: 0.85em;
  }

  @keyframes blink{ 50%{ opacity:0; } }

  .aka{
    margin-top: 20px;
    font-size: 15px;
    color: var(--cyan);
  }

  .aka b{ color: var(--ink); }

  .rule{
    margin: 22px auto;
    width: 60%;
    border-top: 1px dashed rgba(76,243,224,0.25);
  }

  .caption{
    font-size: 14.5px;
    color: var(--dim);
    line-height: 1.6;
    max-width: 30ch;
    margin: 0 auto;
  }

  .press-start{
    margin-top: 26px;
    font-family:'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--cyan);
    animation: blink 1.4s steps(1) infinite;
  }

  @media (prefers-reduced-motion: reduce){
    .screen{ animation:none; opacity:1; }
    .cursor, .press-start{ animation:none; }
  }
</style>
</head>
<body>
  <div class="screen">
    <div class="label">ENTER YOUR NAME</div>
    <div class="callsign">BF168<span class="cursor"></span></div>
    <div class="aka">a.k.a. <b>Supalerk Audomkasob</b></div>
    <div class="rule"></div>
    <p class="caption">รหัสลับที่ไม่มีใครถาม แต่ขอฝากไว้ในใจทุกคนด้วยแล้วกัน</p>
    <div class="press-start">PRESS START</div>
  </div>
</body>
</html>
